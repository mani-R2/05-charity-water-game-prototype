<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Welcome to the Charity Water Game Prototype</h1>
  </header>
  
    <p>People Helped: <span id="score">0</span></p>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <div class="difficulty">
      <button onclick="setDifficulty('easy')">Easy</button>
      <button onclick="setDifficulty('normal')">Normal</button>
      <button onclick="setDifficulty('hard')">Hard</button>
    </div>

  <p>Time Left: <span id="timer">30</span>s</p>

    <div class="grid" id="grid"></div>

    <p id="message">Match people with clean water 💧</p>

    <button id="resetBtn">Play Again</button>

    <div id="endModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="endTitle"></h2>
        <p id="endMessage"></p>
        <button onclick="startGame()">Play Again</button>
      </div>
    </div>

    <footer>
      <p>Made for charity: water | <a href="https://www.charitywater.org" target="_blank">Visit charity: water</a></p>
    </footer>

    <script src="script.js" defer></script>
    
</body>
</html>
